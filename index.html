<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="辨證">
<meta name="theme-color" content="#0d0a07">
<title>韓醫學 辨證·治則·治法 — 추론·시험 2모드</title>
<style>
  :root{
    --bg:#0d0a07; --panel:#171109; --card:#1f160c; --cardh:#2a1d0f;
    --ink:#ece2cf; --muted:#b6a585; --dim:#7d6f57;
    --zhu:#cf4a2c; --bronze:#c9962e; --jade:#6cae8b; --warn:#d6a23a; --azure:#5b9bd5;
    --line:#3a2c1a; --line2:#503c22; --sect:#9a7b3a;
    --serif:"Nanum Myeongjo","Noto Serif KR","Batang",AppleMyungjo,"Apple SD Gothic Neo",serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--serif);
    min-height:100vh; min-height:100dvh; overflow-x:hidden; -webkit-font-smoothing:auto;}
  .bgglyph{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:62vmin; color:#1c130a; z-index:0; pointer-events:none; user-select:none;
    animation:breathe 9s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.5; transform:scale(1);}50%{opacity:.8; transform:scale(1.04);}}
  .wrap{position:relative; z-index:1; max-width:980px; margin:0 auto; padding:18px 14px 92px;}
  header{padding:6px 2px 12px; border-bottom:1px solid var(--line);}
  .ttl{font-size:28px; font-weight:800; letter-spacing:2px;} .ttl .zhu{color:var(--zhu);}
  .sub{font-size:12.5px; color:var(--muted); margin-top:5px; line-height:1.5;}
  .modebar{display:flex; gap:8px; margin:13px 2px 2px;}
  .modebtn{flex:1; padding:11px 10px; border:1px solid var(--line2); border-radius:12px;
    background:var(--panel); color:var(--muted); font-size:15px; font-weight:800; cursor:pointer;
    font-family:var(--serif); touch-action:manipulation; text-align:center; letter-spacing:1px;}
  .modebtn .ms{display:block; font-size:10.5px; color:var(--dim); font-weight:600; letter-spacing:0; margin-top:2px;}
  .modebtn.active{color:var(--ink); border-color:var(--bronze); background:linear-gradient(180deg,#241809,#1a1108);
    box-shadow:0 0 0 1px rgba(201,150,46,.28);}
  .modebtn.active.exam{border-color:var(--azure); box-shadow:0 0 0 1px rgba(91,155,213,.3);}
  .tabs{display:flex; gap:7px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    touch-action:pan-x; padding:12px 2px 6px; margin-bottom:6px; scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto; padding:9px 13px; border:1px solid var(--line2); border-radius:11px;
    background:var(--panel); color:var(--muted); font-size:14px; font-weight:700; cursor:pointer;
    white-space:nowrap; touch-action:manipulation;}
  .tab .n{display:block; font-size:10px; color:var(--dim); font-weight:600; letter-spacing:1px;}
  .tab.active{background:linear-gradient(180deg,#241809,#1a1108); color:var(--ink);
    border-color:var(--bronze); box-shadow:0 0 0 1px rgba(201,150,46,.25);}
  .tab.active.examtab{border-color:var(--azure); box-shadow:0 0 0 1px rgba(91,155,213,.25);}
  .panel{display:none;} .panel.active{display:block; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);}to{opacity:1; transform:none;}}
  .gtitle{font-size:18px; font-weight:800; margin:8px 2px 3px; color:var(--bronze);}
  .ghint{font-size:12.5px; color:var(--muted); margin:0 2px 12px; line-height:1.55;}
  .gprog{font-size:12px; color:var(--dim); margin:2px 2px 10px; letter-spacing:.5px;}
  .board{min-height:160px;}
  .connect-wrap{display:flex; gap:10px;}
  .col{flex:1; display:flex; flex-direction:column; gap:8px;}
  .col-h{font-size:11px; color:var(--dim); text-align:center; letter-spacing:2px; margin-bottom:2px;}
  .card{border:1px solid var(--line2); background:var(--card); color:var(--ink);
    border-radius:10px; padding:11px 12px; font-size:15px; line-height:1.45; cursor:pointer;
    user-select:none; touch-action:manipulation; transition:background .12s, border-color .12s, transform .08s;}
  .card .hz{font-weight:700;}
  .card.sel{border-color:var(--bronze); background:var(--cardh); box-shadow:0 0 0 1px rgba(201,150,46,.4);}
  .card.locked{border-color:var(--jade); background:rgba(108,174,139,.13); color:var(--jade); cursor:default;}
  .card.flash{border-color:var(--zhu); background:rgba(207,74,44,.18); animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
  .order-grid{display:flex; flex-wrap:wrap; gap:9px;}
  .ocard{position:relative; flex:0 0 auto; max-width:100%; border:1px solid var(--line2); background:var(--card);
    border-radius:10px; padding:11px 14px; font-size:15px; cursor:pointer; user-select:none; touch-action:manipulation;
    transition:background .12s, border-color .12s;}
  .ocard.locked{border-color:var(--jade); background:rgba(108,174,139,.13); color:var(--jade); cursor:default;}
  .ocard.flash{border-color:var(--zhu); background:rgba(207,74,44,.18); animation:shake .3s;}
  .ocard .ord{position:absolute; top:-9px; left:-9px; width:22px; height:22px; border-radius:50%;
    background:var(--jade); color:#0d0a07; font-size:12px; font-weight:800; display:none;
    align-items:center; justify-content:center;}
  .ocard.locked .ord{display:flex;}
  .pick-q{font-size:16px; line-height:1.6; margin:4px 2px 14px; color:var(--ink);}
  .pick-q .hz{font-weight:700; color:var(--bronze);}
  .pick-q b{color:var(--warn); font-weight:700;}
  .opts{display:flex; flex-direction:column; gap:9px;}
  .opt{border:1px solid var(--line2); background:var(--card); color:var(--ink);
    border-radius:10px; padding:12px 14px; font-size:15.5px; cursor:pointer; text-align:left;
    font-family:var(--serif); touch-action:manipulation; transition:background .12s, border-color .12s;}
  .opt:disabled{cursor:default; opacity:.85;}
  .opt.ok{border-color:var(--jade); background:rgba(108,174,139,.16); color:var(--jade);}
  .opt.no{border-color:var(--zhu); background:rgba(207,74,44,.14); color:#e8907c; opacity:.7;}
  .reveal{margin:14px 0 0; padding:12px 13px; border-left:3px solid var(--bronze);
    background:rgba(201,150,46,.08); border-radius:0 8px 8px 0; font-size:13.5px; line-height:1.6;
    color:var(--muted); display:none;}
  .reveal.show{display:block; animation:fade .2s ease;} .reveal b{color:var(--ink);}
  .nextbar{margin-top:16px; display:flex; justify-content:flex-end;}
  .btn-next{display:none; padding:11px 20px; border:1px solid var(--bronze); border-radius:11px;
    background:linear-gradient(180deg,#2a1c0b,#1c1208); color:var(--ink); font-size:15px; font-weight:800;
    cursor:pointer; font-family:var(--serif); touch-action:manipulation;}
  .btn-next.show{display:inline-block;} .btn-next:active{transform:scale(.97);}
  .foot{position:fixed; left:0; right:0; bottom:0; z-index:2; background:rgba(13,10,7,.94);
    border-top:1px solid var(--line); padding:9px 14px; backdrop-filter:blur(6px);
    display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--dim);}
  .foot .sc{color:var(--jade); font-weight:700;}
  .kbd{border:1px solid var(--line2); border-radius:5px; padding:1px 6px; font-size:11px; color:var(--muted);}
  @media (hover:hover){
    .card:hover:not(.locked){background:var(--cardh); border-color:var(--bronze);}
    .ocard:hover:not(.locked){background:var(--cardh); border-color:var(--bronze);}
    .opt:hover:not(:disabled){background:var(--cardh); border-color:var(--bronze);}
    .tab:hover{color:var(--ink);} .btn-next:hover{border-color:var(--zhu);} .modebtn:hover{color:var(--ink);}
  }
  @media (min-width:768px){
    .wrap{padding:24px 20px 96px;} .ttl{font-size:32px;}
    .card,.ocard{font-size:16px;} .opt{font-size:16.5px;} .gtitle{font-size:20px;}
  }
  @media (max-width:380px){ .connect-wrap{gap:7px;} .card{padding:10px 9px; font-size:13.5px;} }
  /* === 약점 다이제스트 === */
  .modebar{flex-wrap:wrap;}
  .modebtn.digest{flex:1 0 100%; margin-top:3px; border-color:var(--line2); color:var(--jade);
    background:linear-gradient(180deg,#11160f,#0e120c);}
  .modebtn.digest .ms{color:#5c7d63;}
  .modebtn.digest.active{border-color:var(--jade); color:var(--ink);
    box-shadow:0 0 0 1px rgba(108,174,139,.3); background:linear-gradient(180deg,#13201a,#0f1712);}
  .digest-view{animation:fade .25s ease;}
  .dempty{color:var(--muted); font-size:14px; line-height:1.7; padding:18px 14px; border:1px dashed var(--line2);
    border-radius:12px; margin-top:8px;} .dempty b{color:var(--jade);}
  .dsum{font-size:14px; color:var(--muted); margin:2px 2px 14px; line-height:1.6;} .dsum b{color:var(--jade);}
  .dh{font-size:12px; color:var(--sect); letter-spacing:2px; font-weight:700; margin:18px 2px 8px;
    border-bottom:1px solid var(--line); padding-bottom:5px;}
  .dbars{display:flex; flex-direction:column; gap:9px;}
  .dbar-l{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:3px;}
  .dcat{font-size:14.5px; color:var(--ink); font-weight:700;}
  .dnum{font-size:12px; color:var(--dim);}
  .dbar-t{height:8px; border-radius:5px; background:#1c130a; overflow:hidden;}
  .dbar-t i{display:block; height:100%; background:linear-gradient(90deg,var(--warn),var(--zhu)); border-radius:5px;}
  .dqs{display:flex; flex-direction:column; gap:9px;}
  .dq{border:1px solid var(--line2); background:var(--card); border-radius:11px; padding:11px 12px;}
  .dq-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .dtag{font-size:11px; color:var(--bronze); border:1px solid var(--line2); border-radius:6px; padding:2px 7px; letter-spacing:.5px;}
  .dmiss{font-size:12px; color:#e8907c; font-weight:700;}
  .dq-q{font-size:14px; color:var(--ink); line-height:1.55; margin-bottom:6px;}
  .dq-a{font-size:13px; color:var(--muted); line-height:1.5;}
  .dq-a .bad{color:#e8907c;} .dq-a .good{color:var(--jade); font-weight:700;}
  .dauto{font-size:13.5px; color:var(--muted); line-height:1.7; padding:12px 13px; border-left:3px solid var(--jade);
    background:rgba(108,174,139,.07); border-radius:0 8px 8px 0;} .dauto b{color:var(--ink);}
  .dbtns{display:flex; flex-wrap:wrap; gap:9px; margin:20px 0 6px;}
  .dbtn{flex:1 1 auto; padding:12px 16px; border:1px solid var(--jade); border-radius:11px;
    background:linear-gradient(180deg,#13201a,#0f1712); color:var(--ink); font-size:14.5px; font-weight:800;
    cursor:pointer; font-family:var(--serif); touch-action:manipulation;}
  .dbtn.ghost{border-color:var(--line2); color:var(--muted); background:var(--panel);}
  .dbtn.warn{border-color:var(--line2); color:#cc9988; background:var(--panel);}
  .dbtn:active{transform:scale(.98);}
</style>
</head>
<body>
<div class="bgglyph">證</div>
<div class="wrap">
  <header>
    <div class="ttl">韓醫學 <span class="zhu">辨證·治則·治法</span></div>
    <div class="sub" id="subline">진단 추론 흐름 + 시험 변별 — 2모드 10게임으로 證을 잡고 方을 고르는 훈련</div>
    <div class="modebar" id="modebar"></div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
</div>
<div class="foot">
  <span>모드/탭 전환 · 다음 <span class="kbd">Space</span></span>
  <span class="sc" id="score">맞춤 0</span>
</div>
<script>
(function(){
"use strict";

/* ============================ DATA · 추론 모드 (四診→八綱→臟腑→治則→處方) ============================ */

// R1 · 四診 : 舌·脈으로 證 잡기
var R1_SAJIN = [
 ["<b>舌絳·苔少, 脈細數</b> — 衛氣營血 중 어느 분증인가?", "營分", ["衛分","氣分","營分","血分"], "熱入營分이면 舌色必絳(葉天士 溫熱論). 苔少·脈細數은 營陰 손상. 〔衛氣營血辨證圖表〕"],
 ["<b>舌深絳, 發斑疹·神昏</b> — ?", "血分", ["氣分","營分","血分","衛分"], "舌深絳+發斑疹=血分(邪熱入血 耗血動血). 治=涼血散血(犀角地黃湯)."],
 ["<b>舌紅·苔黃, 脈洪大·大渴</b> — ?", "氣分", ["衛分","氣分","營分","血分"], "舌紅苔黃·脈洪大·大熱大渴=氣分大熱(陽明經證). 治=辛寒淸氣(白虎湯)."],
 ["<b>舌邊尖紅·苔薄白, 脈浮數</b> — ?", "衛分", ["衛分","氣分","營分","血分"], "苔薄白·舌邊尖紅·脈浮數=衛分(邪在衛表). 治=辛凉解表."],
 ["<b>舌淡胖·苔白, 脈沈遲</b> — 寒熱 귀속은?", "裏寒", ["表寒","裏寒","裏熱","表熱"], "舌淡胖苔白·脈沈遲=裏寒(虛寒). 〔裏證 寒熱虛實 鑑別〕"],
 ["<b>舌紅少苔, 脈細數, 五心煩熱</b> — ?", "陰虛(虛熱)", ["實熱","陰虛(虛熱)","實寒","氣虛"], "舌紅少苔·脈細數·五心煩熱=陰虛火旺(虛熱). 治=滋陰淸熱."],
 ["<b>面色蒼白·舌淡, 脈芤</b>(大出血 후) — ?", "血虛", ["氣虛","血虛","陽虛","陰虛"], "面色蒼白·舌淡·脈細無力, 大出血後 芤脈=血虛. 〔血病辨證〕"]
];

// R2 · 八綱 귀속 : 증상 → 표리·한열·허실
var R2_PALGANG = [
 ["<b>壯熱·大汗·大渴, 脈洪大</b> — 八綱 귀속은?", "裏·熱·實", ["表·寒·實","裏·熱·實","裏·寒·虛","表·熱·虛"], "大熱大汗大渴脈洪大=陽明經證(裏熱實). 표리=裏, 한열=熱, 허실=實."],
 ["<b>形寒肢冷·下利淸穀, 脈微</b> — ?", "裏·寒·虛", ["裏·熱·實","裏·寒·虛","表·寒·實","裏·寒·實"], "形寒肢冷·下利淸穀·脈微=虛寒. 〔寒熱의 虛實〕虛寒=陽氣虛衰 陰寒內盛."],
 ["<b>惡寒發熱·頭痛, 無汗, 脈浮緊</b> — ?", "表·寒·實", ["表·寒·實","表·熱·虛","裏·寒·實","表·寒·虛"], "惡寒重·無汗·脈浮緊=表寒實(傷寒). 〔表證 寒熱虛實〕"],
 ["<b>潮熱·盜汗·五心煩熱, 舌紅少苔</b> — ?", "裏·虛熱", ["裏·實熱","裏·虛熱","表·虛熱","裏·虛寒"], "潮熱盜汗五心煩熱·舌紅少苔=陰虛火旺(裏虛熱)."],
 ["<b>惡寒重·發熱輕, 苔薄白潤, 脈浮緊</b> — 表寒/表熱?", "表寒", ["表寒","表熱","裏寒","半表半裏"], "惡寒重發熱輕·苔薄白潤·脈浮緊=表寒. (表熱=發熱重·苔薄白乾·舌邊尖紅·脈浮數)"],
 ["<b>腹脹滿痛拒按·便秘, 脈沈實</b> — 虛/實?", "實(裏實)", ["虛(裏虛)","實(裏實)","虛寒","虛熱"], "脹滿痛拒按·便秘·脈沈實=裏實. (拒按=實, 喜按=虛)"],
 ["<b>疲倦乏力·氣短·語聲低微, 食少便溏</b> — 虛/實?", "虛(裏虛)", ["實(裏實)","虛(裏虛)","實熱","表虛"], "乏力·氣短·聲低·食少便溏=裏虛. 〔虛證과 實證의 감별〕"]
];

// R3 · 臟腑·病性 정위 : 증상군 → 어느 臟
var R3_JANGBU = [
 ["<b>脇部脹痛·胸悶·善太息, 婦女乳房脹痛</b> — 어느 臟?", "肝", ["肝","心","脾","肺"], "肝氣鬱結(鬱於本經). 情志不舒·惱怒傷肝. 〔五臟辨證表解·肝〕"],
 ["<b>心悸·失眠·健忘·多夢, 面色不華</b> — ?", "心", ["心","肝","脾","腎"], "心血虛(失血/生化不足 → 心失所養)."],
 ["<b>面色萎黃·食慾不振·食後脘腹脹滿·便溏</b> — ?", "脾", ["脾","胃","肝","腎"], "脾氣虛(脾氣虛弱 脾失健運)."],
 ["<b>咳喘·痰稀色白·鼻塞淸涕, 口不渴</b> — ?", "肺", ["肺","脾","腎","心"], "風寒束肺(肺氣不宣 表衛不固)."],
 ["<b>腰膝酸軟·形寒肢冷·陽痿, 夜尿多</b> — ?", "腎", ["腎","脾","肝","膀胱"], "腎陽虛衰(氣血運化無力)."],
 ["<b>頭痛·眩暈·面紅目赤·口苦, 易怒</b> — ?", "肝", ["肝","心","膽","胃"], "肝火上炎(氣鬱化火)."],
 ["<b>脘腹隱痛·喜溫喜按·口泛淸水, 便溏</b> — ?", "脾", ["脾","胃","腎","肝"], "脾胃虛寒(脾胃陽虛 → 寒狀)."]
];

// R4 · 治則 立法 : 病性 → 치칙
var R4_CHIKCHEUK = [
 ["<b>正氣虛가 주(邪氣 輕)</b> — 治則?", "扶正(補)", ["扶正(補)","祛邪(瀉)","通因通用","急則治標"], "虛者補之. 扶正=正氣를 도와 邪를 몰아냄."],
 ["<b>邪氣盛이 주(正氣 未衰)</b> — ?", "祛邪(瀉)", ["扶正(補)","祛邪(瀉)","塞因塞用","緩則治本"], "實者瀉之. 祛邪=邪氣를 없애 正을 보존."],
 ["<b>眞熱假寒</b>(裏眞熱·外假寒) — 反治 중?", "寒因寒用", ["熱因熱用","寒因寒用","塞因塞用","通因通用"], "假寒이므로 寒涼藥으로 眞熱을 治 = 寒因寒用(從治)."],

function recordQ(qid, cat, qTuple, wrongPicks){
  if(!cat) cat='기타';
  var Q=STATS.byQ[qid]; if(!Q){ Q={cat:cat, att:0, miss:0, picks:{}, q:qTuple}; STATS.byQ[qid]=Q; }
  Q.att++; Q.cat=cat; if(qTuple) Q.q=qTuple;
  var missed=!!(wrongPicks&&wrongPicks.length);
  if(missed){ Q.miss++; wrongPicks.forEach(function(w){ Q.picks[w]=(Q.picks[w]||0)+1; }); }
  bumpCat(cat, missed); saveStats();
}
function missedTuples(){ var out=[]; Object.keys(STATS.byQ).forEach(function(id){ var Q=STATS.byQ[id]; if(Q.miss>0&&Q.q){ var t=Q.q.slice(); t[5]=id; out.push(t); } }); return out; }

function ConnectGame(panel, rounds, lh, rh, onDone, meta){
  meta=meta||{};
  function catFor(i){ return (meta.cats&&meta.cats[i])||meta.tl||'매칭'; }
  var board=panel.querySelector('.board'), reveal=panel.querySelector('.reveal');
  var nextBtn=panel.querySelector('.btn-next'), prog=panel.querySelector('.gprog');
  if(!board||!nextBtn) return;
  var ri=0, sel=null, lockedInRound=0, totalPairs=0, donePairs=0;
  rounds.forEach(function(r){ totalPairs+=r.length; });
  function updProg(){ if(prog) prog.textContent='라운드 '+(ri+1)+' / '+rounds.length+'  ·  맞춘 짝 '+donePairs+' / '+totalPairs; }
  function renderRound(){
    sel=null; lockedInRound=0;
    if(reveal){ reveal.classList.remove('show'); reveal.innerHTML=''; }
    nextBtn.classList.remove('show');
    var pairs=rounds[ri];
    var lefts=pairs.map(function(p,i){ return {t:p[0],i:i}; });
    var rights=pairs.map(function(p,i){ return {t:p[1],i:i,rev:p[2]||''}; });
    shuffle(rights);
    board.innerHTML='';
    var wrap=el('div','connect-wrap'), colL=el('div','col'), colR=el('div','col');
    colL.appendChild(el('div','col-h',lh||'')); colR.appendChild(el('div','col-h',rh||''));
    lefts.forEach(function(L){ var c=hzCard(L.t); c.dataset.idx=L.i; c.dataset.side='L';
      c.addEventListener('click',function(){ pick(c,'L',L.i,''); }); colL.appendChild(c); });
    rights.forEach(function(R){ var c=hzCard(R.t); c.dataset.idx=R.i; c.dataset.side='R'; c.dataset.rev=R.rev;
      c.addEventListener('click',function(){ pick(c,'R',R.i,R.rev); }); colR.appendChild(c); });
    wrap.appendChild(colL); wrap.appendChild(colR); board.appendChild(wrap); updProg();
  }
  function pick(c,side,idx,rev){
    if(c.classList.contains('locked')) return;
    if(!sel){ sel={c:c,side:side,idx:idx,rev:rev}; c.classList.add('sel'); return; }
    if(sel.side===side){ sel.c.classList.remove('sel'); if(sel.c===c){ sel=null; return; }
      sel={c:c,side:side,idx:idx,rev:rev}; c.classList.add('sel'); return; }
    if(sel.idx===idx){
      sel.c.classList.remove('sel'); sel.c.classList.add('locked'); c.classList.add('locked');
      var r=rev||sel.rev||''; if(reveal&&r){ reveal.innerHTML='<b>✓</b> '+r; reveal.classList.add('show'); }
      sel=null; lockedInRound++; donePairs++; addScore(1); bumpCat(catFor(ri), false); saveStats(); updProg();
      if(window.HubHome&&window.HubHome.tick)window.HubHome.tick(true);
      if(lockedInRound===rounds[ri].length){ nextBtn.textContent=(ri<rounds.length-1)?'다음 라운드 →':'다음 게임 →'; nextBtn.classList.add('show'); }
    } else { bumpCat(catFor(ri), true); saveStats(); if(window.HubHome&&window.HubHome.tick)window.HubHome.tick(false); flash(sel.c); flash(c); sel.c.classList.remove('sel'); sel=null; }
  }
  nextBtn.addEventListener('click',function(){ if(ri<rounds.length-1){ ri++; renderRound(); } else { onDone(); } });
  renderRound();
}

function OrderGame(panel, sets, onDone){
  var board=panel.querySelector('.board'), gsub=panel.querySelector('.gsub');
  var reveal=panel.querySelector('.reveal'), nextBtn=panel.querySelector('.btn-next'), prog=panel.querySelector('.gprog');
  if(!board||!nextBtn) return;
  var si=0;
  function renderSet(){
    if(reveal){ reveal.classList.remove('show'); reveal.innerHTML=''; }
    nextBtn.classList.remove('show');
    var s=sets[si], next=0;
    if(gsub) gsub.textContent=s.title;
    if(prog) prog.textContent='세트 '+(si+1)+' / '+sets.length;
    board.innerHTML='';
    var grid=el('div','order-grid');
    var order=s.items.map(function(t,i){ return {t:t,i:i}; });
    var shown=order.slice(); shuffle(shown);
    shown.forEach(function(o){ var c=el('div','ocard'); c.innerHTML='<span class="ord"></span>'+o.t;
      c.addEventListener('click',function(){
        if(c.classList.contains('locked')) return;
        if(o.i===next){ c.classList.add('locked'); next++; var b=c.querySelector('.ord'); if(b)b.textContent=next; addScore(1);
          if(window.HubHome&&window.HubHome.tick)window.HubHome.tick(true);
          if(next===s.items.length){ if(reveal){ reveal.innerHTML='<b>✓</b> '+s.reveal; reveal.classList.add('show'); }
            nextBtn.textContent=(si<sets.length-1)?'다음 세트 →':'다음 게임 →'; nextBtn.classList.add('show'); } }
        else { flash(c); if(window.HubHome&&window.HubHome.tick)window.HubHome.tick(false); }
      }); grid.appendChild(c); });
    board.appendChild(grid);
  }
  nextBtn.addEventListener('click',function(){ if(si<sets.length-1){ si++; renderSet(); } else { onDone(); } });
  renderSet();
}

function PickGame(panel, qs, onDone, meta){
  meta=meta||{};
  var board=panel.querySelector('.board'), reveal=panel.querySelector('.reveal');
  var nextBtn=panel.querySelector('.btn-next'), prog=panel.querySelector('.gprog');
  if(!board||!nextBtn) return;
  var qi=0;
  function renderQ(){
    if(reveal){ reveal.classList.remove('show'); reveal.innerHTML=''; }
    nextBtn.classList.remove('show');
    var q=qs[qi];
    if(prog) prog.textContent='문제 '+(qi+1)+' / '+qs.length;
    board.innerHTML='';
    var qd=el('div','pick-q'); qd.innerHTML='<span class="hz">Q'+(qi+1)+'.</span> '+q[0]; board.appendChild(qd);
    var wrap=el('div','opts'), opts=q[2].slice(); shuffle(opts); var answered=false, wrongThis=[];
    opts.forEach(function(o){ var b=el('button','opt'); b.type='button'; b.textContent=o;
      b.addEventListener('click',function(){
        if(answered||b.disabled) return;
        if(o===q[1]){ b.classList.add('ok'); answered=true; addScore(1);
          var qid=q[5]||((meta.mk||'?')+'/'+(meta.tl||'?')+'#'+qi);
          recordQ(qid, q[4]||meta.tl, [q[0],q[1],q[2],q[3],q[4]], wrongThis.slice());
          if(window.HubHome&&window.HubHome.tick)window.HubHome.tick(wrongThis.length===0);
          Array.prototype.forEach.call(wrap.children,function(x){ x.disabled=true; });
          if(reveal){ reveal.innerHTML='<b>✓ '+q[1]+'</b> — '+q[3]; reveal.classList.add('show'); }
          nextBtn.textContent=(qi<qs.length-1)?'다음 문제 →':'다음 게임 →'; nextBtn.classList.add('show'); }
        else { b.classList.add('no'); b.disabled=true; wrongThis.push(o); }
      }); wrap.appendChild(b); });
    board.appendChild(wrap);
  }
  nextBtn.addEventListener('click',function(){ if(qi<qs.length-1){ qi++; renderQ(); } else { onDone(); } });
  renderQ();
}

function autoSummary(cats,qs,acc){
  var worst=cats.filter(function(c){return c.miss>0;}).slice(0,3);
  var s='현재 정답률 <b>'+acc+'%</b>. ';
  if(worst.length){ s+='가장 약한 귀속은 '+worst.map(function(c){return '<b>'+c.k+'</b>('+c.rate+'%)';}).join(', ')+'. '; }
  var conf=qs.slice(0,3).map(function(x){ var p=Object.keys(x.picks).sort(function(a,b){return x.picks[b]-x.picks[a];})[0]; return p?(((x.q&&x.q[1])||'')+'를 “'+p+'”로 혼동'):''; }).filter(Boolean);
  if(conf.length) s+='대표 혼동 — '+conf.join('; ')+'. ';
  if(worst[0]) s+='→ <b>'+worst[0].k+'</b> 집중 복습 권장.';
  return s;
}
function renderDigestHTML(){

function digestText(){

  var totAtt=0,totMiss=0; Object.keys(STATS.byCat).forEach(function(k){totAtt+=STATS.byCat[k].att; totMiss+=STATS.byCat[k].miss;});
  var acc=totAtt?Math.round((totAtt-totMiss)/totAtt*100):0;
  var L=['[변증·치칙·치법 약점 다이제스트]','총 '+totAtt+'회 시도 · 오답 '+totMiss+'회 · 정답률 '+acc+'%','','■ 귀속별 오답 (약한 순)'];
  cats.forEach(function(c){ L.push(' · '+c.k+' : '+c.miss+'/'+c.att+' ('+c.rate+'%)'); });
  L.push(''); L.push('■ 반복 오답 문항');
  qs.slice(0,15).forEach(function(Q){ var picks=Object.keys(Q.picks||{}).sort(function(a,b){return Q.picks[b]-Q.picks[a];}); var ps=picks.map(function(p){return '“'+p+'”×'+Q.picks[p];}).join(', '); var qt=((Q.q&&Q.q[0])||'').replace(/<[^>]+>/g,''); L.push(' · ['+Q.cat+'] '+qt); L.push('     내 오답: '+(ps||'—')+' → 정답: '+((Q.q&&Q.q[1])||'')+'  ('+Q.miss+'회)'); });
  return L.join('\n');
}

<script id="hh-core">
(function(){

function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function today(){return iso(new Date());}
function addDays(s,n){var d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return iso(d);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function readJSON(k){try{return JSON.parse(window.localStorage.getItem(k));}catch(e){return null;}}

function skey(){return (CFG&&CFG.key?CFG.key:'hub')+'_home_v1';}

function record(tool,qid,o){
  ensureST();o=o||{};var id=String(qid);

  Q.seen++; if(o.cat)Q.cat=o.cat; if(o.q!=null)Q.q=o.q; if(o.a!=null)Q.a=o.a; if(tool)Q.tool=tool;

function logGame(tool,qid,o){
  ensureST();o=o||{};var id=String(qid);var total=o.total||0,correct=o.correct||0;var wrongN=Math.max(0,total-correct);
  var Q=ST.q[id]||{tool:tool||'',cat:o.cat||'기타',q:o.q||'',a:o.a||'',seen:0,wrong:0,picks:{},lastWrong:null};
  Q.seen+=total; Q.wrong+=wrongN; if(o.cat)Q.cat=o.cat; if(o.q!=null)Q.q=o.q; if(tool)Q.tool=tool; if(wrongN>0)Q.lastWrong=today();

/* ---- normalized collectors (bridge or own store) ---- */
function bridge(){ if(CFG&&typeof CFG.bridge==='function'){ try{return CFG.bridge()||{};}catch(e){return {};} } return {}; }
function collectQ(){
  var b=bridge();
  if(b.q&&b.q.length){ return b.q.map(function(e){var s=e.seen||0,w=e.wrong||0;return {tool:e.tool||CFG.key,id:String(e.id),q:e.q||'',a:e.a||'',cat:e.cat||'기타',seen:s,wrong:w,wrongRate:s?Math.round(w/s*100):0,picks:e.picks||{},lastWrong:e.lastWrong||null};}); }
  return Object.keys(ST.q).map(function(id){var Q=ST.q[id];return {tool:Q.tool||CFG.key,id:id,q:Q.q,a:Q.a,cat:Q.cat||'기타',seen:Q.seen,wrong:Q.wrong,wrongRate:Q.seen?Math.round(Q.wrong/Q.seen*100):0,picks:Q.picks||{},lastWrong:Q.lastWrong};});
}
function collectCats(){
  var b=bridge();
  if(b.cats&&b.cats.length){ return b.cats.map(function(c){var s=c.seen||0,w=c.wrong||0;return {cat:c.cat,seen:s,wrong:w,rate:s?Math.round(w/s*100):0};}); }

/* ---- stats helpers ---- */
function streakOf(days){var cur=today();if(!days[cur])cur=addDays(cur,-1);var n=0;while(days[cur]&&days[cur].a>0){n++;cur=addDays(cur,-1);}return n;}
function bestStreakOf(days){var ks=Object.keys(days).filter(function(d){return days[d].a>0;}).sort();if(!ks.length)return 0;var best=1,run=1;for(var i=1;i<ks.length;i++){if(addDays(ks[i-1],1)===ks[i]){run++;}else{run=1;}if(run>best)best=run;}return best;}
function summary(){
  var qs=collectQ(),days=collectDays();
  var seen=0,wrong=0; qs.forEach(function(e){seen+=e.seen;wrong+=e.wrong;});
  var dAtt=0,dCor=0; Object.keys(days).forEach(function(d){dAtt+=days[d].a;dCor+=days[d].c;});
  var studyDays=Object.keys(days).filter(function(d){return days[d].a>0;}).length;
  var t=today();var todayN=days[t]?days[t].a:0;
  var attempts=seen>0?seen:dAtt;
  var acc=attempts?Math.round((attempts-wrong)/attempts*100):0;
  return {seen:seen,wrong:wrong,attempts:attempts,acc:acc,studyDays:studyDays,streak:streakOf(days),best:bestStreakOf(days),today:todayN,weakQ:qs.filter(function(e){return e.wrong>0;}).length,trackedQ:qs.length,dAtt:dAtt,dCor:dCor};
}
var UNIT=function(){return (CFG&&CFG.unit)||'문';};

/* ===================== CALENDAR VIEW ===================== */

     tile('✍️','오늘',s.today+UNIT())+'</div>';

     '<div class="hh-caltt">'+calYM.y+'년 <span class="mm">'+(calYM.m+1)+'월</span></div>'+
     '<button class="hh-calnav" id="hh-cal-next">›</button></div>';
  h+='<div class="hh-dow"><span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span></div>';
  h+='<div class="hh-grid">'+monthCells(calYM.y,calYM.m,days)+'</div>';

  Object.keys(days).forEach(function(d){if(d.indexOf(mPrefix)===0){if(days[d].a>0)mDays++;mAtt+=days[d].a;mCor+=days[d].c;}});
  var mAcc=mAtt?Math.round(mCor/mAtt*100):0;
  h+='<div class="hh-calsum">이 달 — 학습 <b>'+mDays+'일</b> · 푼 문제 <b>'+mAtt+UNIT()+'</b> · 정답률 <b>'+mAcc+'%</b></div>';
  // last 7 days mini bars
  h+=last7(days);
  h+='</div>';
  h+='<div class="hh-foot">달력의 각 칸은 그 날 푼 문제 수입니다. 색이 진할수록 많이 푼 날이며, 오늘은 금색 테두리로 표시됩니다. 진도는 이 브라우저에 저장되며 게임을 풀면 자동으로 쌓입니다.</div>';

function tile(ic,lab,val){return '<div class="hh-tile"><div class="hh-tic">'+ic+'</div><div class="hh-tval">'+val+'</div><div class="hh-tlab">'+lab+'</div></div>';}
function lvl(n){return n===0?0:(n<3?1:(n<7?2:(n<15?3:4)));}
function monthCells(y,m,days){
  var first=new Date(y,m,1),start=first.getDay(),dim=new Date(y,m+1,0).getDate();
  var t=today();var cells='';
  for(var i=0;i<start;i++)cells+='<div class="hh-day pad"></div>';
  for(var dnum=1;dnum<=dim;dnum++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dnum).padStart(2,'0');
    var v=days[ds]?days[ds].a:0;var L=lvl(v);
    var cls='hh-day'+(L?' l'+L:'')+(ds===t?' today':'')+(ds>t?' future':'');
    cells+='<div class="'+cls+'" title="'+ds+(v?' · '+v+UNIT():'')+'"><span class="dn">'+dnum+'</span>'+(v?'<span class="dc">'+v+'</span>':'')+'</div>';
  }
  return cells;
}
function last7(days){
  var arr=[],max=1,t=today();
  for(var i=6;i>=0;i--){var ds=addDays(t,-i);var v=days[ds]?days[ds].a:0;arr.push({ds:ds,v:v});if(v>max)max=v;}
  var wd=['일','월','화','수','목','금','토'];
  var h='<div class="hh-week7">';
  arr.forEach(function(o){var hgt=Math.round(o.v/max*100);var dow=wd[new Date(o.ds+'T00:00:00').getDay()];
    h+='<div class="b"><div class="bn">'+(o.v||'')+'</div><div class="bar" style="height:'+(o.v?Math.max(8,hgt):0)+'%"></div><div class="bl">'+dow+'</div></div>';});
  h+='</div>';
  return h;
}

}
function weakAll(){return collectQ().filter(function(e){return e.wrong>0;}).sort(function(a,b){return (b.wrong-a.wrong)||(b.wrongRate-a.wrongRate)||(b.seen-a.seen);});}
function weakByTool(){var m={};weakAll().forEach(function(e){(m[e.tool]=m[e.tool]||[]).push(e);});return m;}

/* ---- export builders ---- */
function buildExport(includeRaw){
  var s=summary(),weak=weakAll(),days=collectDays();
  var exp={
    meta:{app:(CFG&&CFG.title)||CFG.key,key:CFG.key,exportedAt:new Date().toISOString(),today:today(),schema:1,
      note:'weakSpots=문항별 오답(문제·정답 포함). dailyActivity=일별 풀이/정답. raw=원본 저장.'},
    summary:{streak:s.streak,bestStreak:s.best,studyDays:s.studyDays,totalAttempts:s.attempts,overallAccuracy:s.acc,trackedQuestions:s.trackedQ,weakQuestions:s.weakQ},
    categories:catAgg().map(function(c){return {category:c.cat,seen:c.seen,wrong:c.wrong,wrongRate:c.rate};}),
    weakSpots:weak.map(function(e){return {tool:e.tool,toolLabel:toolLabel(e.tool),id:e.id,question:strip(e.q)||null,category:e.cat,answer:e.a||null,seen:e.seen,wrong:e.wrong,wrongRate:e.wrongRate,myWrongPicks:e.picks,lastWrong:e.lastWrong};}),
    dailyActivity:Object.keys(days).sort().map(function(d){return {date:d,attempts:days[d].a,correct:days[d].c};})
  };
  if(includeRaw){var raw={};raw[skey()]=ST;if(CFG&&CFG.rawKeys){CFG.rawKeys.forEach(function(k){var o=readJSON(k);if(o)raw[k]=o;});}exp.raw=raw;}
  return exp;
}

function downloadText(name,txt,mime){

/* ---- compare ---- */
function deltaTag(d){if(d>0)return '<span class="hh-up">▲'+d+'</span>';if(d<0)return '<span class="hh-down">▼'+(-d)+'</span>';return '<span class="hh-flat">—</span>';}
function runCompare(txt){
  var out=root.querySelector('#hh-cmp-out');if(!out)return;
  var old=null;try{var o=JSON.parse(txt);if(o&&o.summary)old=o;}catch(e){}
  if(!old){out.innerHTML='<div class="hh-cmp-err">JSON을 읽지 못했습니다. 이전에 내보낸 통계 JSON 전체(중괄호 포함)를 붙여넣어 주세요.</div>';return;}
  var cur=buildExport(false);var oldDate=(old.meta&&old.meta.today)?old.meta.today:'이전';
  var oa=old.summary.overallAccuracy||0,ca=cur.summary.overallAccuracy||0,op=old.summary.totalAttempts||0,cp=cur.summary.totalAttempts||0;
  var h='<div class="hh-cmp-line">'+oldDate+' → 오늘 · 정답률 '+oa+'% → <b>'+ca+'%</b> '+deltaTag(ca-oa)+' · 풀이 '+op+' → '+cp+' (+'+Math.max(0,cp-op)+')</div>';
  var ow={};(old.weakSpots||[]).forEach(function(w){ow[w.tool+'::'+w.id]=w;});
  var cw={};(cur.weakSpots||[]).forEach(function(w){cw[w.tool+'::'+w.id]=w;});
  var fixed=[],worse=[],neww=[];
  Object.keys(ow).forEach(function(k){if(!cw[k])fixed.push(ow[k]);else if((cw[k].wrong||0)>(ow[k].wrong||0))worse.push(cw[k]);});
  Object.keys(cw).forEach(function(k){if(!ow[k])neww.push(cw[k]);});
  h+='<div class="hh-cmp-sub">오답 문항 변화</div><div class="hh-cmp-line2">✅ 해결 <b>'+fixed.length+'</b> · ⚠️ 더 틀림 <b>'+worse.length+'</b> · 🆕 새 오답 <b>'+neww.length+'</b></div>';
  function mini(lab,list){if(!list.length)return '';return '<div class="hh-cmp-mini">'+lab+' '+list.slice(0,6).map(function(w){return esc(String(w.question||w.id)).slice(0,30);}).join(' · ')+(list.length>6?' …':'')+'</div>';}
  h+=mini('개선:',fixed)+mini('새 오답:',neww);
  out.innerHTML=h;
}

  qs.slice(0,12).forEach(function(x){
    var picks=Object.keys(x.picks).sort(function(a,b){return x.picks[b]-x.picks[a];});
    var pickStr=picks.length?picks.map(function(p){return '“'+esc(p)+'”×'+x.picks[p];}).join(', '):'—';
    h+='<div class="hh-q"><div class="hh-q-top"><span class="hh-tag">'+esc(x.cat)+'</span><span class="hh-qmiss">'+x.wrong+'회 오답</span></div>'+
       '<div class="hh-q-q">'+esc(strip(x.q)||x.id)+'</div>'+
       '<div class="hh-q-a">내 오답: <span class="bad">'+pickStr+'</span> &nbsp;→&nbsp; 정답: <span class="good">'+esc(x.a)+'</span></div></div>';});
  h+='</div>';
  h+='<div class="hh-sec-h">자동 요약</div><div class="hh-auto">'+autoSummary(cats,qs,s.acc)+'</div>';
  h+='<div class="hh-btns">';
  if(CFG&&typeof CFG.review==='function')h+='<button class="hh-btn" id="hh-d-review">오답만 복습 ('+qs.length+')</button>';
  h+='<button class="hh-btn ghost" id="hh-d-copy">텍스트 복사</button>';
  h+='</div></div>';
  return h;
}
function digestText(){
  var s=summary(),cats=collectCats().filter(function(c){return c.wrong>0;}).sort(function(a,b){return b.wrong-a.wrong;}),qs=weakAll();
  var L=['['+((CFG&&CFG.title)||CFG.key)+' 약점 다이제스트]','총 '+s.attempts+'회 시도 · 오답 '+s.wrong+'회 · 정답률 '+s.acc+'%','','■ 귀속별 오답 (약한 순)'];
  cats.forEach(function(c){L.push(' · '+c.cat+' : '+c.wrong+'/'+c.seen+' ('+c.rate+'%)');});
  L.push('');L.push('■ 반복 오답 문항');
  qs.slice(0,15).forEach(function(x){var picks=Object.keys(x.picks).sort(function(a,b){return x.picks[b]-x.picks[a];});var ps=picks.map(function(p){return '“'+p+'”×'+x.picks[p];}).join(', ');L.push(' · ['+x.cat+'] '+strip(x.q));L.push('     내 오답: '+(ps||'—')+' → 정답: '+(x.a||'')+'  ('+x.wrong+'회)');});
  return L.join('\n');
}

/* ===================== CONTROLLER ===================== */
function views(){
  return '<div class="hh-kick">'+esc((CFG&&CFG.kicker)||'학습 허브')+'</div>'+
    '<div class="hh-h1">학습 <b>현황</b></div>'+
    '<div class="hh-seg">'+
      seg('cal','달력·현황','일별 통계 한눈에')+
      seg('analysis','약점 분석','오답·귀속+내보내기')+
      seg('digest','다이제스트','반복오답 자동정리')+
    '</div>'+
    '<div class="hh-view'+(curView==='cal'?' on':'')+'" data-v="cal" id="hh-v-cal"></div>'+
    '<div class="hh-view'+(curView==='analysis'?' on':'')+'" data-v="analysis" id="hh-v-analysis"></div>'+
    '<div class="hh-view'+(curView==='digest'?' on':'')+'" data-v="digest" id="hh-v-digest"></div>';
}
function seg(v,t,s){return '<button class="hh-segb'+(curView===v?' on':'')+'" data-seg="'+v+'">'+t+'<span class="s">'+s+'</span></button>';}
function vEl(v){return root.querySelector('.hh-view[data-v="'+v+'"]');}
function paint(){
  if(curView==='cal')vEl('cal').innerHTML=renderCal();
  else if(curView==='analysis')vEl('analysis').innerHTML=renderAnalysis();
  else vEl('digest').innerHTML=renderDigest();
  wire();
}
function switchView(v){
  curView=v;
  root.querySelectorAll('.hh-segb').forEach(function(b){b.classList.toggle('on',b.dataset.seg===v);});
  root.querySelectorAll('.hh-view').forEach(function(el){el.classList.toggle('on',el.dataset.v===v);});
  paint();
}
function wire(){
  if(curView==='cal'){
    var p=root.querySelector('#hh-cal-prev'),n=root.querySelector('#hh-cal-next');
    if(p)p.addEventListener('click',function(){calYM.m--;if(calYM.m<0){calYM.m=11;calYM.y--;}paint();});
    if(n)n.addEventListener('click',function(){var now=new Date();calYM.m++;if(calYM.m>11){calYM.m=0;calYM.y++;}if(calYM.y>now.getFullYear()||(calYM.y===now.getFullYear()&&calYM.m>now.getMonth())){calYM.m=now.getMonth();calYM.y=now.getFullYear();}paint();});
  }
  if(curView==='analysis'){
    var nb=root.querySelector('#hh-note-btn');
    if(nb)nb.addEventListener('click',function(){var box=root.querySelector('#hh-note');var show=(box.style.display==='none');box.style.display=show?'block':'none';nb.textContent=show?'📝 약점 노트 접기':'📝 약점 노트 펼치기 (문제→정답)';if(show)renderNote();});
    root.querySelectorAll('[data-drill]').forEach(function(b){b.addEventListener('click',function(){var tool=b.dataset.drill;var ids=(weakByTool()[tool]||[]).map(function(e){return e.id;});if(ids.length&&CFG.drill)CFG.drill(tool,ids);});});
    var ec=root.querySelector('#hh-exp-copy');if(ec)ec.addEventListener('click',function(){try{var raw=root.querySelector('#hh-exp-raw').checked;var json=JSON.stringify(buildExport(raw),null,2);root.querySelector('#hh-exp-ta').value=json;copyText(json,'JSON 복사됨');}catch(e){setNote('오류: '+(e&&e.message||e));}});
    var ed=root.querySelector('#hh-exp-dl');if(ed)ed.addEventListener('click',function(){try{var raw=root.querySelector('#hh-exp-raw').checked;downloadText((CFG.key||'hub')+'_통계_'+today()+'.json',JSON.stringify(buildExport(raw),null,2),'application/json');}catch(e){setNote('오류');}});
    var em=root.querySelector('#hh-exp-md');if(em)em.addEventListener('click',function(){try{root.querySelector('#hh-exp-ta').value=buildMD();copyText(buildMD(),'요약(MD) 복사됨');}catch(e){setNote('오류');}});
    var er=root.querySelector('#hh-exp-raw');if(er)er.addEventListener('change',refreshExport);
    var ct=root.querySelector('#hh-cmp-toggle');if(ct)ct.addEventListener('click',function(){var b=root.querySelector('#hh-cmp-body');b.style.display=(b.style.display==='none')?'block':'none';});
    var cr=root.querySelector('#hh-cmp-run');if(cr)cr.addEventListener('click',function(){runCompare(root.querySelector('#hh-cmp-in').value);});
    var cfb=root.querySelector('#hh-cmp-file-btn');if(cfb)cfb.addEventListener('click',function(){var f=root.querySelector('#hh-cmp-file');if(f)f.click();});
    var cf=root.querySelector('#hh-cmp-file');if(cf)cf.addEventListener('change',function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){root.querySelector('#hh-cmp-in').value=r.result;runCompare(r.result);};try{r.readAsText(f);}catch(err){}});
    refreshExport();
  }
  if(curView==='digest'){
    var rv=root.querySelector('#hh-d-review');if(rv&&CFG.review)rv.addEventListener('click',function(){var ids=weakAll().map(function(e){return e.id;});CFG.review(ids);});
    var cp=root.querySelector('#hh-d-copy');if(cp)cp.addEventListener('click',function(){var t=digestText();try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t);}else{var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}}catch(e){}cp.textContent='복사됨 ✓';setTimeout(function(){if(cp)cp.textContent='텍스트 복사';},1500);});
  }
}

function mount(el,opts){
  var _pk=(CFG&&CFG.key); CFG=opts||{}; if(!CFG.key)CFG.key=_pk||'hub';
  ensureST(); root=el; curView=CFG.startView||'cal';
  root.classList.add('hh'); root.innerHTML=views();
  root.querySelectorAll('.hh-segb').forEach(function(b){b.addEventListener('click',function(){switchView(b.dataset.seg);});});
  paint();
  return window.HubHome;
}
function refresh(){if(root)paint();}

window.HubHome={mount:mount,refresh:refresh,record:record,logGame:logGame,tick:tick,touch:touch,setKey:setKey,
  store:function(){return ensureST();},config:function(){return CFG;},_export:buildExport};
})();
</script>

<script>try{HubHome.setKey('byunjeung');}catch(e){}</script>
</body>
